<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinha D'Ouro - Loja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L8 6v10c0 2 1 4 4 6 3-2 4-4 4-6V6l-4-4z"/>
                    </svg>
                </div>
                <h2>Vinha D'Ouro</h2>
            </div>
            
            <div class="sidebar-user">
                <div class="user-avatar" style="background: #d4af37; color: #4a1c23;">L</div>
                <div>
                    <p style="font-weight: bold;">Loja Premium</p>
                    <p style="font-size: 12px; opacity: 0.8;">Vendas</p>
                </div>
            </div>
            
            <nav style="flex: 1;">
                <a href="loja.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                    </svg>
                    <span>Loja de Vinhos</span>
                </a>
            </nav>
            
            <a href="index.html" class="logout-btn">Sair</a>
        </aside>
        
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Loja Premium</h1>
                    <p>Seleção exclusiva de vinhos finos</p>
                </div>
            </header>
            
            <div class="pos-layout">
                <!-- PAINEL DOS PRODUTOS -->
                <div class="products-panel">
                    <div class="category-selector">
                        <button class="category-btn active" data-tipo="">Todos</button>
                        <button class="category-btn" data-tipo="Tinto">🍷 Tinto</button>
                        <button class="category-btn" data-tipo="Branco">🥂 Branco</button>
                        <button class="category-btn" data-tipo="Rosé">🌸 Rosé</button>
                        <button class="category-btn" data-tipo="Espumante">🍾 Espumante</button>
                        <button class="category-btn" data-tipo="Porto">🍷 Porto</button>
                    </div>
                    
                    <div class="products-grid" id="products-grid">
                        <p style="padding:20px;color:#888;">A carregar vinhos…</p>
                    </div>
                </div>
                
                <!-- PAINEL DO CARRINHO -->
                <div class="cart-panel">
                    <div style="padding: 20px; background: var(--beige); border-bottom: 2px solid var(--tan);">
                        <h3 style="color: var(--wine-dark);">🛒 Carrinho</h3>
                        <p id="cart-count" style="font-size: 12px; color: #666; margin-top: 4px;">0 itens</p>
                    </div>
                    
                    <div id="cart-items" style="padding: 20px; flex: 1; overflow-y: auto;">
                        <p style="padding:20px;color:#aaa;text-align:center;">Carrinho vazio</p>
                    </div>
                    
                    <div style="padding: 20px; border-top: 2px solid var(--tan);">
                        <div style="background: var(--beige); padding: 16px; border-radius: 12px; margin-bottom: 16px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px;">
                                <span style="color: #666;">Total:</span>
                                <strong id="cart-total" style="font-size: 24px; color: var(--gold); font-family: 'Playfair Display', serif;">€0.00</strong>
                            </div>
                        </div>
                        <button class="btn-add" style="font-size: 16px; font-weight: bold;" onclick="alert('Funcionalidade de checkout disponível no menu de consola.')">✓ Finalizar Compra</button>
                        <button onclick="clearCart()" style="width: 100%; padding: 12px; margin-top: 10px; background: white; border: 2px solid var(--tan); border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--wine-primary); transition: all 0.3s ease;">Limpar Carrinho</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
