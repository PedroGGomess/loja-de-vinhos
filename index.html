<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinha D'Ouro - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-content">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L8 6v10c0 2 1 4 4 6 3-2 4-4 4-6V6l-4-4z"/>
                    <circle cx="12" cy="11" r="3"/>
                </svg>
            </div>
            <h1 class="brand-name">Vinha D'Ouro</h1>
            <p class="brand-tagline">Premium Wine Collection</p>
            
            <div class="login-divider"></div>
            
            <h2 class="section-title">Acesso ao Sistema</h2>
            <p class="section-subtitle">Escolha a sua área profissional</p>
            
            <div class="role-cards">
                <a href="gerente.html" class="role-card">
                    <div class="role-card-icon gerente-gradient">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18M9 21V9"/>
                        </svg>
                    </div>
                    <div class="role-card-text">
                        <h3>Gerente Executivo</h3>
                        <p>Dashboard completo e gestão total</p>
                    </div>
                    <div class="role-card-arrow">→</div>
                </a>
                
                <a href="loja.html" class="role-card">
                    <div class="role-card-icon funcionario-gradient">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="5" width="20" height="14" rx="2"/>
                            <path d="M2 10h20"/>
                        </svg>
                    </div>
                    <div class="role-card-text">
                        <h3>Loja Premium</h3>
                        <p>Sistema de vendas de vinhos</p>
                    </div>
                    <div class="role-card-arrow">→</div>
                </a>
                
                <a href="stock.html" class="role-card">
                    <div class="role-card-icon armazenista-gradient">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        </svg>
                    </div>
                    <div class="role-card-text">
                        <h3>Armazenista</h3>
                        <p>Gestão de inventário e logística</p>
                    </div>
                    <div class="role-card-arrow">→</div>
                </a>
            </div>
            
            <div class="login-footer">
                <p>© 2026 Vinha D'Ouro - Loja Premium de Vinhos Finos</p>
            </div>
        </div>
    </div>
</body>
</html>
