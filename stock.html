<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinha D'Ouro - Stock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L8 6v10c0 2 1 4 4 6 3-2 4-4 4-6V6l-4-4z"/>
                    </svg>
                </div>
                <h2>Vinha D'Ouro</h2>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar" style="background:  #b9182b;">G</div>
                <div>
                    <p style="font-weight: bold;">Armazenista</p>
                    <p style="font-size: 12px; opacity: 0.8;">Logística</p>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="stock.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    </svg>
                    <span>Inventário</span>
                </a>
            </nav>
            
            <a href="index.html" class="logout-btn">Sair</a>
        </aside>
        
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Gestão de Stock</h1>
                    <p class="page-subtitle">Controlo de inventário</p>
                </div>
            </header>
            
            <div class="dashboard-grid">
                <div class="kpi-card">
                    <p class="kpi-label">Total de Vinhos</p>
                    <div class="kpi-value" id="kpi-total-garrafas">…</div>
                    <small class="kpi-meta">Garrafas em armazém</small>
                </div>
                <div class="kpi-card">
                    <p class="kpi-label">Stock Crítico</p>
                    <div class="kpi-value" id="kpi-stock-critico" style="color: #c62828;">…</div>
                    <small class="kpi-trend negative">⚠ Reposição urgente</small>
                </div>
                <div class="kpi-card">
                    <p class="kpi-label">Valor em Stock</p>
                    <div class="kpi-value" id="kpi-valor-stock">…</div>
                    <small class="kpi-meta">Inventário total</small>
                </div>
            </div>
            
            <div class="data-table-container">
                <div class="table-header">
                    <h3>Inventário Completo</h3>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Stock</th>
                            <th>Região</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="stock-tbody">
                        <tr><td colspan="7" style="color:#aaa;">A carregar…</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
